<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>国际公共采购（联合国篇）培训课程研发项目 · 结项评审会</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #f7f7f7; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; color: #222; -webkit-text-size-adjust: 100%; }
    .page { max-width: 720px; margin: 0 auto; padding: 16px; }
    .title { text-align: center; font-size: 18px; font-weight: 700; margin: 12px 0 16px; line-height: 1.5; }
    .img-wrap { background: #fff; border-radius: 10px; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .img-wrap img { display: block; width: 100%; height: auto; border-radius: 6px; }
    .tip { margin-top: 14px; text-align: center; font-size: 13px; color: #888; }
    @media (max-width: 480px) {
      .title { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="title">国际公共采购（联合国篇）培训课程研发项目<br/>结项评审会议议程</div>
    <div class="img-wrap">
      <img src="会议议程.png" alt="会议议程" />
    </div>
    <div class="tip">长按图片可保存到相册</div>
  </div>
</body>
</html>
